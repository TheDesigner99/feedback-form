<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Feedback Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 650px;
      margin: auto;
      background: #ffffff;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 8px;
    }

    p.description {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      width: 100%;
      padding: 12px;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <div class="container">

    <h2>Client Feedback Form</h2>
    <p class="description">
      Thank you for choosing my graphic design services. Your feedback helps me improve my work quality, communication, and client experience.
    </p>

    <form action="https://formsubmit.co/hammadkarim.art@gmail.com" method="POST">

      <!-- FormSubmit settings -->
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Client Feedback Received">
      <input type="hidden" name="_next" value="https://thedesigner99.github.io/feedback-form/thank-you.html">

      <label>Client Name</label>
      <input type="text" name="Client Name" required>

      <label>Project Name</label>
      <input type="text" name="Project Name" required>

      <label>Are you satisfied with my graphic design services?</label>
      <select name="Service Satisfaction" required>
        <option value="">Select</option>
        <option>Very Satisfied</option>
        <option>Satisfied</option>
        <option>Neutral</option>
        <option>Unsatisfied</option>
        <option>Very Unsatisfied</option>
      </select>

      <label>Are you satisfied with my work ethics and professionalism?</label>
      <select name="Professionalism" required>
        <option value="">Select</option>
        <option>Very Satisfied</option>
        <option>Satisfied</option>
        <option>Neutral</option>
        <option>Unsatisfied</option>
        <option>Very Unsatisfied</option>
      </select>

      <label>Did I deliver your project on time?</label>
      <select name="On Time Delivery" required>
        <option value="">Select</option>
        <option>Yes</option>
        <option>No</option>
        <option>Partially</option>
      </select>

      <label>Are you satisfied with the quality of the final design work?</label>
      <select name="Quality" required>
        <option value="">Select</option>
        <option>Very Satisfied</option>
        <option>Satisfied</option>
        <option>Neutral</option>
        <option>Unsatisfied</option>
        <option>Very Unsatisfied</option>
      </select>

      <label>How was my communication during the project?</label>
      <select name="Communication" required>
        <option value="">Select</option>
        <option>Excellent</option>
        <option>Good</option>
        <option>Average</option>
        <option>Poor</option>
      </select>

      <label>Were revisions and changes handled properly?</label>
      <select name="Revisions" required>
        <option value="">Select</option>
        <option>Yes</option>
        <option>No</option>
        <option>Partially</option>
      </select>

      <label>Are you satisfied with my rates/pricing?</label>
      <select name="Pricing" required>
        <option value="">Select</option>
        <option>Very Satisfied</option>
        <option>Satisfied</option>
        <option>Neutral</option>
        <option>Unsatisfied</option>
        <option>Very Unsatisfied</option>
      </select>

      <label>Would you recommend my graphic design services to others?</label>
      <select name="Recommendation" required>
        <option value="">Select</option>
        <option>Yes</option>
        <option>No</option>
        <option>Maybe</option>
      </select>

      <label>Please rate my service (1 = Poor, 5 = Excellent)</label>
      <select name="Rating" required>
        <option value="">Select Rating</option>
        <option>1</option>
        <option>2</option>
        <option>3</option>
        <option>4</option>
        <option>5</option>
      </select>

      <label>Additional Comments</label>
      <textarea name="Comments" rows="5" placeholder="Please share your feedback, suggestions, or comments."></textarea>

      <button type="submit">Submit Feedback</button>

    </form>

  </div>

</body>
</html>
