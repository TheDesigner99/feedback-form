<!DOCTYPE html>

      font-size: 16px;
      line-height: 1.6;
    }

    .icon {
      font-size: 50px;

    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 18px;
      background: #007bff;
      color: white;
      text-decoration: none;
      border-radius: 8px;

    a:hover {
